[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "account-abstraction/=lib/account-abstraction/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# KMS K4 PR-2: KmsSigning.t.sol reads a pre-computed signature fixture via
# `vm.readFile`. Permission is scoped to the test fixtures directory only.
fs_permissions = [
    { access = "read", path = "./test/fixtures" }
]

[fuzz]
runs = 256
