# Sprint 3 S3.5 — dependency-review
#
# GitHub-native action that flags any newly introduced dependency
# with a high-severity vulnerability or a license outside the
# allowed set.
#
# Allowed licenses tracked here:
#   MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
#
# Allowed list deliberately tight; widening it requires an
# Information-Architect / Security review (see docs/operations/ci-setup.md).

name: dependency-review

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
          comment-summary-in-pr: on-failure
