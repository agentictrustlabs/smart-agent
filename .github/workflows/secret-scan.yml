# Sprint 3 S3.5 — secret scanning (gitleaks)
#
# Runs gitleaks against the PR diff. Fails the job on any detection.
# Local pre-commit hook is documented in docs/operations/ci-setup.md
# but is opt-in (not auto-installed).

name: secret-scan

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan commits across the PR diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail on any detected secret. No baseline — we want zero leakage.
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
